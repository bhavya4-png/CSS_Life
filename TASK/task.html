<!DOCTYPE html>
<html>
<head>
    <title>CSS Combinators</title>
    <style>
        body{
            font-family: Times New Roman, serif;
            margin: 20px;
        }

        h1{
            font-size: 40px;
        }

        /* Descendant Combinator */
        .descendant p,
        .descendant li{
            background-color: slateblue;
            color: white;
            padding: 8px;
            margin: 10px 0;
        }

        /* Child Combinator */
        .child > p{
            background-color: slateblue;
            color: white;
            padding: 8px;
            margin: 10px 0;
        }

        /* Adjacent Sibling Combinator */
        h2 + p{
            background-color: slateblue;
            color: white;
            padding: 8px;
        }

        /* General Sibling Combinator */
        h3 ~ p{
            background-color: slateblue;
            color: white;
            padding: 8px;
        }

        hr{
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <h1>Descendant Combinator</h1>

    <div class="descendant">
        <p>Child</p>
        <p>Child</p>
        <ul>
            <li>Descendant</li>
        </ul>
    </div>

    <hr>

    <h1>Child Combinator</h1>

    <div class="child">
        <p>Child</p>
        <p>Child</p>
        <ul>
            <li>Descendant</li>
        </ul>
    </div>

    <hr>

    <h1>Adjacent Sibling Combinator</h1>

    <h2>Heading</h2>
    <p>First sibling after heading</p>
    <p>Second sibling after heading</p>

    <hr>

    <h1>General Sibling Combinator</h1>

    <h3>Heading</h3>
    <p>First sibling after heading</p>
    <p>Second sibling after heading</p>

</body>
</html>

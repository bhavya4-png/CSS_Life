<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width: 400px;
            height: 300px;
            border-radius: 50px;
            border-style: double;
            border-color: hotpink;
            border-top-left-radius: 150px;
            border-top-right-radius: 150px;

            border-left: double  solid 20px hotpink;
            border-right: double solid 20px hotpink;
            border-top: 1px;
            border-bottom: 1px;
            border-left-width: 20px;
            border-right-width: 20px;
            justify-content: center;
            align-items: center;
            display: flex;

        }
    </style>
</head>
<body>
    <h1 class="main">
        Advanced Round Rectangle
    </h1>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .A{
            width: 400px;
            height:300px;
            border: solid;
            border-radius: 5px;
            border-top-right-radius: 200px;
            border-bottom-left-radius: 200px;
            border-right-color:aqua;
            border-top-color:aqua;
            border-bottom-color:hotpink ;
            border-left-color:hotpink;
            border-right: solid 50px aqua;
            border-top:solid 10px aqua ;
            border-left: solid 50px hotpink;
            border-bottom: solid 10px hotpink;
           justify-content: center;
            align-items: center;
            display: flex;
        }
         .B{
            width: 400px;
            height: 200px;
            border-style: groove;
            border-width: 20px;
            border-left: groove 20px rgba(255, 105, 180, 0.768) ;
            border-top: groove 20px rgb(77, 253, 77);
            border-top-right-radius: 180px;
            border-bottom: groove 20px aqua;
            border-bottom-right-radius: 180px;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
            border-right-color: rgba(172, 255, 47, 0.537); 
            display: flex;
            justify-content: center;
            align-items: center;
       
        }
         .C{
            width: 400px;
            height: 200px;
            border: solid;
            border-top-left-radius: 300px;
            border-top-right-radius: 300px;
            border-bottom: dashed  2px rgb(3, 141, 19);
            border-bottom-width: 5px;
            border-left: groove 50px rgba(10, 192, 40, 0.947);
            border-right: groove 50px rgba(10, 192, 40, 0.947);
            border-top:groove 5px rgba(10, 192, 40, 0.866); 
            justify-content: center;
            align-items: center;
            display: flex;

        }
         .D{
            width: 400px;
            height: 300px;
            border-radius: 50px;
            border-style: double;
            border-color: hotpink;
            border-top-left-radius: 150px;
            border-top-right-radius: 150px;
            border-bottom-left-radius: 200px;
            border-bottom-right-radius: 200px;
            border-left: double  solid 20px hotpink;
            border-right: double solid 20px hotpink;
            border-top: 1px;
            border-bottom: 1px;
            border-left-width: 18px;
            border-right-width: 18px;
            justify-content: center;
            align-items: center;
            display: flex;

        }
    </style>
</head>
<body>
    <h1 class="A" align="center" style="background-color: greenyellow;">
       Advanced Leaf
    </h1>
    <h1 class="B" >
       Advanced Bullet
    </h1>
    <h1 class="C"> 
        Advanced Hemisphere
    </h1>
    <h1 class="D">
        Advanced Round Rectangle
    </h1>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a[href^='https']{
            background-color: darkorange;
        }
        a[href$='.com']{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <a href="https://www.google.com"></a>
    <a href="https://www.amazon.com"></a>
</body>
</html>

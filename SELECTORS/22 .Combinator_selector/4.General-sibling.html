<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1~p{
            background-color:greenyellow;
        }
    </style>
</head>
<body>
    <p> Generalsibling -only focuses on all adjacent siblings [ not previous] <br> symbol is tilde (~)</p>
     <div>
        <h1> I am heading-1</h1>
        <p> I am para-1 </p>
        <p> I am para-2 </p>
        <h1> I am heading-2 </h1>
        <p> I am para-1 </p>
        <p> I am para-2 </p>
    </div>
</body>
</html>

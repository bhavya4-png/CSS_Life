<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .father >p{
            background-color: black;
        }
    </style>
</head>
<body>
    <p> desendent selector= selects direct children  <br> symbol is greater than (>) </p>
    <div class="father">
        <div class=" 1st son">
            <h1> 1st son's -son </h1>
            <p> 1st son's -daug</p>
        </div>
        <div class="2nd son">
            <h1> 2nd son's -son </h1>
        </div>
        <p> adopted-daug</p>
    </div>
</body>
</html>

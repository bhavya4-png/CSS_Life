<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .container{
            width: 100vw;
            height: 73vh;
            background-color: black;
            border: 2px dotted white;
        }
        .box{
            width: 100px;
            height: 89px;
            background-color: chartreuse;
            color: black;
            border: blue;
        }
        #box-1{
            transform: translate(10px,6px);
        }
        #box-2{
            transform: translate(120px,60px);
        }
        #box-3{
            transform: translate(120px,200px);
        }
        #box-4{
            transform: translateX(340px) rotate(57deg);
        }
        #box-5{
            transform: translate(660px,-350px);
        }
        #box-6{
            transform: translate(560px,-295px);
        }
        #box-7{
            transform: translate(560px,-150px);
        }
         #box-8{
            transform: translate(660px,-80px);
        }
         #box-9{
            transform: translate(10px,-170px);
        }
    </style>
</head>
<body>
    <div class="container">
       <div class="box" id="box-1">1</div>
       <div class="box" id="box-2">2</div>
       <div class="box" id="box-3">3</div>
       <div class="box" id="box-4">4</div>
       <div class="box" id="box-5">5</div>
       <div class="box" id="box-6">6</div>
       <div class="box" id="box-7">7</div>
       <div class="box" id="box-8">8</div>
       <div class="box" id="box-9">9</div>
    </div>
</body>
</html>

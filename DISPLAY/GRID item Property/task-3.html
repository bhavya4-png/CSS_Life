<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .main{
            display: grid;
            height: 630px;
           grid-template-columns: 2fr 2fr 2fr ;
           grid-template-rows: repeat(5,150px);
           gap: 10px 10px; 
        }
        .box{
            padding: 13px;
            border: 1px solid black; 
            background-color: rgb(13, 242, 55);  
        }
        #box-1{
            grid-row: 1/3;
             background-color:blue;
        }
        #box-2{
        background-color: rgb(224, 167, 9);
       } 
       #box-3{
        background-color: blue;
       } 
       #box-5{
        background-color: rgb(246, 26, 147);
       }
       #box-8{
        background-color: blue;
       }
       #box-6{
        grid-row: 2/4;
        grid-column: 3/4;
        background-color: rgb(15, 225, 240);
       }
        #box-7{
        background-color: rgb(15, 225, 240);
       }
        #box-10{
        grid-row: 4/6;
        grid-column: 1/2;
        background-color: rgb(224, 167, 9);
       } 
       #box-11{
        grid-row: 4/6;
        grid-column: 2/4;
        background-color: rgb(246, 26, 147);
       }
    </style>
</head>
<body>
    <div class="main">
        <div class="box" id="box-1">box-1</div>
        <div class="box" id="box-2">box-2</div>
        <div class="box" id="box-3">box-3</div>
        <!-- <div class="box" id="box-4">box-4</div> -->
        <div class="box" id="box-5">box-5</div>
        <div class="box" id="box-6">box-6</div>
        <div class="box" id="box-7">box-7</div>
        <div class="box" id="box-8">box-8</div>
        <!-- <div class="box" id="box-9">box-9</div> -->
        <div class="box" id="box-10">box-10</div>
        <div class="box" id="box-11">box-11</div>
        <!-- <div class="box" id="box-12">box-12</div>
        <div class="box" id="box-13">box-13</div>
        <div class="box" id="box-14">box-14</div>
        <div class="box" id="box-15">box-15</div> -->      
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .main{
            display: grid;
            height: 630px;
            grid-template-columns: 2fr 2fr 2fr 2fr 2fr;
            grid-template-rows: repeat(5,150px);
            gap: 10px 10px; 
        }
        .box{
            padding: 13px;
            border: 3px solid black; 
            background-color: rgb(13, 242, 55);  
        }
        #box-1{
            grid-column: 1/6;
        }
        #box-2{
            grid-row: 2/4;
            grid-column: 1/2;
        }
        #box-3{
            grid-column: 2/6;
         }
        #box-4{
            grid-column: 2/4;
        }
        #box-5{
            grid-column: 4/6;
        }
        #box-6{
            grid-column: 1/6;
        }
        #box-12{
            grid-column: 1/6;
        }
    </style>
</head>
<body>
    <h1 align="center">CSS GRID</h1>
    <div class="main">
         <div class="box" id="box-1" align="center">
            <th>Header</th></div>
        <div class="box" id="box-2" align="center"><th>Status Bar</th></div>
        <div class="box" id="box-3" align="center"><th>Content 1</th></div>
        <div class="box" id="box-4" align="center"><th>Content 2</th></div>
        <div class="box" id="box-5" align="center"><th>Content 3</th></div>
        <div class="box" id="box-6" align="center"><th>Footer</th></div> 
</body>
</html>
